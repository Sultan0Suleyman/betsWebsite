<header>
  <app-dark-additional-nav-bar></app-dark-additional-nav-bar>
  <app-green-empty-nav-bar></app-green-empty-nav-bar>
</header>

<div class="loginMain">
  <div class="form-container">
    <h2>Sign Up</h2>
    <form [formGroup]="myForm" (ngSubmit)="submitForm()">
      <div class="form-group">
        <label for="username">Email or ID:</label>
        <input type="text" id="username" formControlName="username" autocomplete="current-username">
      </div>
      <div class="form-group">
        <label for="password">Enter the password:</label>
        <input type="password" id="password" formControlName="password" autocomplete="current-password">
      </div>
      <p class="error" *ngIf="myForm.invalid && myForm.get('username')?.dirty && myForm.get('password')?.dirty">
        Wrong login or password.
      </p>
      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" formControlName="rememberMe">
          Remember Me
        </label>
      </div>
      <button type="submit" [disabled]="!myForm.valid">Submit</button>
    </form>
    <div class="message">
      <p *ngIf="submitChecker">{{ errorMessage }}</p>
    </div>
  </div>
</div>
