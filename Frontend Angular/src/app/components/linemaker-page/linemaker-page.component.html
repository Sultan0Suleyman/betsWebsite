<header>
  <app-linemaker-nav-bar (unpublishedMatchesClicked)="onIsUnpublishedMatchesClicked()"
                         (lineMatchesClicked)="onIsLineMatchesClicked()"
                         (liveMatchesClicked)="onIsLiveMatchesClicked()"
                         (createMatchClicked)="onIsCreateMatchClicked()">
  </app-linemaker-nav-bar>
</header>

<ng-container *ngIf="isUnpublishedMatchesClicked">
  <app-linemaker-unpublished-matches (setOddsRequested)="onSetOddsClicked($event)"></app-linemaker-unpublished-matches>
</ng-container>

<ng-container *ngIf="isLineMatchesClicked">
  <app-linemaker-line-matches></app-linemaker-line-matches>
</ng-container>

<ng-container *ngIf="isLiveMatchesClicked">
  <app-linemaker-live-matches></app-linemaker-live-matches>
</ng-container>

<ng-container *ngIf="isCreateMatchClicked">
  <app-linemaker-create-match></app-linemaker-create-match>
</ng-container>

<!-- Новый компонент для настройки коэффициентов -->
<ng-container *ngIf="isSetOddsClicked && selectedMatchId">
  <app-linemaker-set-odds-match [matchId]="selectedMatchId"
                          (backToList)="goBackToUnpublishedMatches()">
  </app-linemaker-set-odds-match>
</ng-container>
