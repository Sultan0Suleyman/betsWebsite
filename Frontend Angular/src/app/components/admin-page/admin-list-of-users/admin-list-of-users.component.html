<p class="sort-title">Sort by role:</p>
<div class="button-group">
  <button class="btn btn-primary" (click)="onRoleButton('ROLE_PLAYER')">Player</button>
  <button class="btn btn-primary" (click)="onRoleButton('ROLE_SUPPORT')">Support</button>
  <button class="btn btn-primary" (click)="onRoleButton('ROLE_LINEMAKER')">Linemaker</button>
  <button class="btn btn-secondary" (click)="onShowAllButton()">Show All</button>
</div>

<table class="user-table">
  <thead>
  <tr>
    <th>Id</th>
    <th>Name</th>
    <th>Surname</th>
    <th>Role</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr *ngFor="let user of users">
    <td>{{ user.id }}</td>
    <td>{{ user.name }}</td>
    <td>{{ user.surname }}</td>
    <td>{{ user.role }}</td>
    <td>
      <button class="btn btn-info" (click)="viewUserDetails(user.id)">View</button>
      <button class="btn btn-danger" (click)="deleteUser(user.id)">Delete</button>
    </td>
  </tr>
  </tbody>
</table>
